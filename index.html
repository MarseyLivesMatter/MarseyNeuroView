<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarseyNeuroView - 3D Disorder Chart</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --fg: #e8e8ec;
            --muted: #6b6b7b;
            --accent: #ff9f43;
            --accent-dim: #e58a3a;
            --card: rgba(20, 20, 30, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --adhd: #ff6b6b;
            --autism: #4ecdc4;
            --ocd: #ffe66d;
            --schizophrenia: #c44dff;
            --anxiety: #ff9f43;
            --depression: #5f9ea0;
        }

        body.light-mode {
    --bg: #f7f4ef;
    --bg-secondary: #ffffff;
    --fg: #1d1d24;
    --muted: #656574;
    --card: rgba(255, 255, 255, 0.82);
    --border: rgba(0, 0, 0, 0.12);
}

body.light-mode .sidebar {
    background: linear-gradient(135deg, var(--card) 0%, rgba(247, 244, 239, 0.95) 100%);
}

body.light-mode .control-btn {
    background: rgba(0, 0, 0, 0.04);
}

body.light-mode .control-btn:hover {
    background: rgba(0, 0, 0, 0.08);
}

body.light-mode .tooltip {
    background: rgba(255, 255, 255, 0.95);
    color: var(--fg);
}

body.light-mode .modal-overlay {
    background: rgba(255, 255, 255, 0.72);
}

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            min-height: 100vh;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: linear-gradient(135deg, var(--card) 0%, rgba(10, 10, 15, 0.95) 100%);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateX(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed { transform: translateX(-280px); }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(255, 159, 67, 0.2) 0%, rgba(255, 107, 107, 0.2) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255, 159, 67, 0.3);
            flex-shrink: 0;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username-section { margin-top: 16px; }

        .username-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .username-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .username-input::placeholder { color: var(--muted); }

        .menu-section {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .menu-section::-webkit-scrollbar { width: 4px; }
        .menu-section::-webkit-scrollbar-track { background: transparent; }
        .menu-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .menu-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            padding: 8px 12px;
            margin-top: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 4px 0;
        }

        .menu-item:hover { background: rgba(255, 255, 255, 0.05); }
        .menu-item.active { background: rgba(255, 159, 67, 0.15); color: var(--accent); }
        .menu-item.active .menu-icon { color: var(--accent); }

        .menu-icon { width: 20px; height: 20px; color: var(--muted); }

        /* Disorder Cards */
        .disorder-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
            transition: all 0.3s ease;
        }

        .disorder-card:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.15); }
        .disorder-card.selected { border-color: var(--accent); background: rgba(255, 159, 67, 0.08); }

        .disorder-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .disorder-info { display: flex; align-items: center; gap: 10px; }
        .disorder-dot { width: 12px; height: 12px; border-radius: 4px; }
        .disorder-name { font-weight: 600; font-size: 14px; }
        .disorder-value { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

        .disorder-sliders { display: flex; flex-direction: column; gap: 10px; }
        .slider-row { display: flex; align-items: center; gap: 10px; }
        .slider-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); width: 70px; flex-shrink: 0; }
        .slider-container { flex: 1; position: relative; }

        input[type="range"] {
            -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.1); border-radius: 3px; outline: none; cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); box-shadow: 0 0 10px rgba(255, 159, 67, 0.4); }
        input[type="range"]:focus-visible::-webkit-slider-thumb { box-shadow: 0 0 0 3px rgba(255, 159, 67, 0.4); }

        .slider-value { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--fg); width: 32px; text-align: right; }

        /* Toggle Button */
        .sidebar-toggle {
            position: absolute; right: -44px; top: 50%; transform: translateY(-50%);
            width: 36px; height: 72px; background: var(--card); border: 1px solid var(--border);
            border-left: none; border-radius: 0 8px 8px 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .sidebar-toggle:hover { background: rgba(30, 30, 45, 0.9); }
        .sidebar-toggle svg { transition: transform 0.3s ease; }
        .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }

        /* Title Overlay */
        .title-overlay {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            z-index: 50; text-align: center; pointer-events: none;
        }
        .main-title { font-size: 14px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        .sub-title { font-size: 28px; font-weight: 600; background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* Bottom Controls */
        .bottom-controls {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 12px; background: var(--card);
            backdrop-filter: blur(20px); padding: 12px 20px; border-radius: 16px; border: 1px solid var(--border);
        }

        .control-btn {
            display: flex; align-items: center; gap: 8px; padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            border-radius: 10px; color: var(--fg); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; font-family: 'Space Grotesk', sans-serif;
        }
        .control-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        .control-btn:active { transform: translateY(0); }
        .control-btn.primary { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%); border-color: var(--accent); color: var(--bg); }
        .control-btn.primary:hover { box-shadow: 0 4px 20px rgba(255, 159, 67, 0.4); }
        .control-btn.secondary { background: rgba(196, 77, 255, 0.1); border-color: rgba(196, 77, 255, 0.3); color: #c44dff; }
        .control-btn.secondary:hover { background: rgba(196, 77, 255, 0.2); }
        .control-btn svg { width: 16px; height: 16px; }

        /* Total Severity Panel */
        .total-severity-panel {
            position: fixed; right: 24px; top: 24px; min-width: 180px;
            background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; z-index: 100;
        }
        .total-severity-header { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
        .total-severity-value { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
        .total-severity-value span { font-size: 16px; color: var(--muted); font-weight: 400; }
        .severity-bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
        .severity-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff6b6b); border-radius: 3px; transition: width 0.3s ease; }

        /* Info Panel */
        .info-panel {
            position: fixed; right: 24px; top: 130px; width: 180px;
            background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; z-index: 100; opacity: 0;
            transform: translateY(-10px); transition: all 0.3s ease; pointer-events: none;
        }
        .info-panel.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .info-color { width: 16px; height: 16px; border-radius: 4px; }
        .info-title { font-size: 18px; font-weight: 600; }
        .info-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 12px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 600; }

        /* View Indicator */
        .view-indicator {
            position: fixed; right: 24px; bottom: 100px;
            background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px; z-index: 100; display: flex; align-items: center; gap: 10px;
        }
        .view-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
        .view-text { font-size: 12px; color: var(--muted); }

        /* Tooltip */
        .tooltip {
            position: fixed; background: rgba(0, 0, 0, 0.9); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none;
            z-index: 200; opacity: 0; transition: opacity 0.2s ease;
        }
        .tooltip.visible { opacity: 1; }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            z-index: 500; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px;
            width: 90%; max-width: 600px; max-height: 80vh; overflow: hidden;
            display: flex; flex-direction: column; position: relative;
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .modal-overlay.visible .modal-content { transform: scale(1); }

        .modal-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-size: 20px; font-weight: 600; color: var(--accent); }
        .modal-close {
            background: transparent; border: none; color: var(--muted); cursor: pointer;
            padding: 4px; transition: color 0.2s;
        }
        .modal-close:hover { color: var(--fg); }

        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }

        .rec-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rec-item:last-child { border-bottom: none; margin-bottom: 0; }
        .rec-title { font-weight: 600; font-size: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .rec-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); }
        .rec-badge.low { color: #4ecdc4; background: rgba(78, 205, 196, 0.1); }
        .rec-badge.moderate { color: #ffe66d; background: rgba(255, 230, 109, 0.1); }
        .rec-badge.high { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .rec-text { font-size: 14px; color: var(--muted); line-height: 1.5; }

        /* Loading & Misc */
        .loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loading-spinner { width: 60px; height: 60px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 14px; color: var(--muted); letter-spacing: 2px; }
        .reset-all-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; margin: 16px; background: rgba(255, 107, 107, 0.1); border: 1px solid rgba(255, 107, 107, 0.3); border-radius: 10px; color: #ff6b6b; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; font-family: 'Space Grotesk', sans-serif; }
        .reset-all-btn:hover { background: rgba(255, 107, 107, 0.2); border-color: rgba(255, 107, 107, 0.5); }


        .mascot-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.9;
        }
        .mascot-overlay img {
            width: 140px;
            height: auto;

        }
        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .sidebar.collapsed { transform: translateX(-240px); }
            .title-overlay { left: 180px; }
            .info-panel, .total-severity-panel { right: 12px; width: 160px; }
            .bottom-controls { flex-wrap: wrap; max-width: 90vw; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }

        /* Questionnaire */
        .quiz-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
        }
        .quiz-overlay.hidden { display: none; }
        .quiz-box {
            width: 90%; max-width: 640px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 40px;
            backdrop-filter: blur(20px);
        }
        .quiz-progress-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.08);
            border-radius: 2px; margin-bottom: 32px; overflow: hidden;
        }
        .quiz-progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent), #ff6b6b);
            border-radius: 2px; transition: width 0.4s ease;
        }
        .quiz-disorder-tag {
            font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
            padding: 4px 10px; border-radius: 20px; display: inline-block;
            margin-bottom: 16px; font-weight: 600;
        }
        .quiz-question {
            font-size: 20px; font-weight: 600; color: var(--fg);
            line-height: 1.4; margin-bottom: 28px;
        }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; }
        .quiz-option {
            padding: 14px 18px; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.03);
            color: var(--fg); font-size: 15px; cursor: pointer;
            transition: all 0.2s ease; text-align: left;
            font-family: 'Space Grotesk', sans-serif;
        }
        .quiz-option:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateX(4px); }
        .quiz-option.selected { border-color: var(--accent); background: rgba(255,159,67,0.12); color: var(--accent); }
        .quiz-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 28px;
        }
        .quiz-counter { font-size: 13px; color: var(--muted); }
        .quiz-next-btn {
            padding: 12px 28px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border: none; color: var(--bg); font-size: 14px; font-weight: 600;
            cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s ease; opacity: 0.4; pointer-events: none;
        }
        .quiz-next-btn.active { opacity: 1; pointer-events: auto; }
        .quiz-next-btn.active:hover { box-shadow: 0 4px 20px rgba(255,159,67,0.4); transform: translateY(-1px); }
        .quiz-intro { text-align: center; }
        .quiz-intro-title { font-size: 28px; font-weight: 700; color: var(--fg); margin-bottom: 12px; }
        .quiz-intro-sub { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
        .quiz-start-btn {
            padding: 14px 40px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border: none; color: var(--bg); font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s ease;
        }
        .quiz-start-btn:hover { box-shadow: 0 4px 20px rgba(255,159,67,0.4); transform: translateY(-2px); }

        .title-cat {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 64px;
            height: auto;
            pointer-events: none;
        }
        .title-cat-left {
            right: calc(100% + 10px);
            transform: translateY(-50%) scaleX(-1);
        }
        .title-cat-right {
            left: calc(100% + 10px);
        }
    </style>
</head>
<body>

    <!-- Questionnaire Overlay -->
    <div class="quiz-overlay" id="quizOverlay">
        <div class="quiz-box" id="quizBox">
            <!-- intro shown first, replaced by JS -->
        </div>
    </div>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing MarseyNeuroView...</div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="recModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Personalized Recommendations</div>
                <button class="modal-close" id="closeModalBtn" aria-label="Close modal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div class="mascot-overlay"><img src="3dmarsey.gif" alt="Marsey"></div>
    <div id="canvas-container"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">

function getRecommendation(key, severity) {
  const level = severity < 40 ? "low" : severity < 70 ? "moderate" : "high";
  const item = recData[key]?.[level];

  return {
    level,
    text: item?.text || "No recommendation available.",
    sources: item?.sources || []
  };

        function updateCubeHeight(disorderKey) {
            const data = disorderData[disorderKey];
            const cube = cubes[disorderKey];
            if (!cube) return;
            
            const targetHeight = data.severity / 20;
            
            const animateHeight = () => {
                const diff = targetHeight - cube.scale.y;
                if (Math.abs(diff) > 0.01) {
                    cube.scale.y += diff * 0.15;
                    cube.position.y = cube.scale.y / 2;
                    requestAnimationFrame(animateHeight);
                } else {
                    cube.scale.y = targetHeight;
                    cube.position.y = targetHeight / 2;
                }
            };
            animateHeight();
            
            if (labels[disorderKey]) labels[disorderKey].position.y = 5.8;

            // Update severity label value and track cube mid-height for position
            const sevLabel = severityLabels[disorderKey];
            if (sevLabel) {
                const canvas = sevLabel.userData.canvas;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 40px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(data.severity.toString(), canvas.width / 2, canvas.height / 2);
                sevLabel.material.map.needsUpdate = true;

                // Animate position alongside cube height
                const animateLabel = () => {
                    sevLabel.position.y = cubes[disorderKey].position.y;
                    if (Math.abs(cubes[disorderKey].scale.y - targetHeight) > 0.01) {
                        requestAnimationFrame(animateLabel);
                    }
                };
                animateLabel();
            }
        }

        function createDisorderCubes() {
            const geometry = new THREE.BoxGeometry(1.2, 1, 1.2);
            Object.entries(disorderData).forEach(([key, data]) => {
                const height = data.severity / 20;
                const material = new THREE.MeshStandardMaterial({ color: data.color, metalness: 0.3, roughness: 0.4, emissive: data.color, emissiveIntensity: 0.1 });
                const cube = new THREE.Mesh(geometry, material);

                cube.position.set(data.position.x, height / 2, data.position.z);
                cube.castShadow = true;
                cube.receiveShadow = true;
                cube.userData = { key, ...data };

                scene.add(cube);
                cubes[key] = cube;

                const label = createLabel(data.name, data.position.x, 5.8, data.position.z, data.color);
                labels[key] = label;

                const sevLabel = createSeverityLabel(data.severity, data.position.x + 0.95, cube.scale.y / 2, data.position.z);
                severityLabels[key] = sevLabel;
            });

        function createLabel(text, x, y, z, color) {
            const canvas = document.createElement('canvas');

            canvas.height = 64;

            context.fillRect(0, 0, canvas.width, canvas.height);
            context.font = 'bold 32px Space Grotesk, sans-serif';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.shadowColor = 'rgba(0, 0, 0, 0.5)';
            context.shadowBlur = 8;
            context.shadowOffsetX = 2;
            context.shadowOffsetY = 2;
            context.fillStyle = '#' + color.toString(16).padStart(6, '0');
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.set(x, y, z);
            sprite.scale.set(2, 0.5, 1);
            scene.add(sprite);

        function createParticles() {
            const particleCount = 500;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const colorPalette = [new THREE.Color(0xff9f43), new THREE.Color(0xc44dff), new THREE.Color(0xff6b6b), new THREE.Color(0x4ecdc4), new THREE.Color(0xffe66d)];
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 40;
                positions[i3 + 1] = Math.random() * 15;
                positions[i3 + 2] = (Math.random() - 0.5) * 40;
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;
                sizes[i] = Math.random() * 3 + 1;
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            const material = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, sizeAttenuation: true });
            const particles = new THREE.Points(geometry, material);
            particles.userData.isParticle = true;
            scene.add(particles);
        }

        function handleViewChange(view) {

        function animateCamera(target) {
            const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            const duration = 1000;
            const startTime = Date.now();
            function updateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                camera.position.set(startPos.x + (target.x - startPos.x) * eased, startPos.y + (target.y - startPos.y) * eased, startPos.z + (target.z - startPos.z) * eased);
                if (progress < 1) requestAnimationFrame(updateCamera);
            }
            updateCamera();
        }

        function getCompressedDataURL(sourceCanvas, maxWidth, quality) {
            const aspect = sourceCanvas.height / sourceCanvas.width;
            const width = Math.min(sourceCanvas.width, maxWidth);
            const height = width * aspect;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(sourceCanvas, 0, 0, width, height);
            return tempCanvas.toDataURL('image/jpeg', quality);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = Date.now() * 0.001;
            Object.entries(cubes).forEach(([key, cube], i) => {
                const baseHeight = cube.scale.y;
                cube.position.y = baseHeight / 2 + Math.sin(time + i) * 0.03;
                const pulse = 1 + Math.sin(time * 2 + i * 0.5) * 0.01;
                cube.scale.x = pulse;
                cube.scale.z = pulse;
            });
            scene.children.forEach(child => {
                if (child.userData && child.userData.isParticle) child.rotation.y += 0.0003;
            });
            renderer.render(scene, camera);
        }

                        <div class="quiz-intro-title">MarseyNeuroView</div>
                    </div>
                    <div class="quiz-intro-sub" style="margin-top:10px;">
                        Answer 6 short questions to get a personalised estimate<br>of your neurodiversity profile.<br><br>
                        <em style="font-size:13px;color:var(--muted)">This is not a medical diagnosis. Results are illustrative only.</em>
                    </div>
                    <button class="quiz-start-btn" id="quizStartBtn">Begin Assessment</button>
                </div>`;
            document.getElementById('quizStartBtn').addEventListener('click', () => {
                currentQ = 0;
                renderQuestion();
            });
        }

        function renderQuestion() {
            const q = questions[currentQ];
            const total = questions.length;
            const progress = ((currentQ) / total) * 100;

            quizBox.innerHTML = `
                <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
                <div class="quiz-disorder-tag" style="background:${q.color}22;color:${q.color};">${q.label}</div>
                <div class="quiz-question">${q.text}</div>
                <div class="quiz-options" id="quizOptions">
                    ${q.options.map((o, i) => `<button class="quiz-option" data-index="${i}">${o.text}</button>`).join('')}
                </div>
                <div class="quiz-nav">
                    <span class="quiz-counter">Question ${currentQ + 1} of ${total}</span>
                    <button class="quiz-next-btn" id="quizNextBtn">${currentQ === total - 1 ? 'See Results' : 'Next'}</button>
                </div>`;

            // Restore previous answer if navigating back
            if (answers[q.disorder] !== undefined) {
                const prevScore = answers[q.disorder];
                const prevIdx = q.options.findIndex(o => o.score === prevScore);
                if (prevIdx !== -1) {
                    document.querySelectorAll('.quiz-option')[prevIdx].classList.add('selected');
                    document.getElementById('quizNextBtn').classList.add('active');
                }
            }

            document.querySelectorAll('.quiz-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    answers[q.disorder] = q.options[parseInt(btn.dataset.index)].score;
                    document.getElementById('quizNextBtn').classList.add('active');
                });
            });

            document.getElementById('quizNextBtn').addEventListener('click', () => {
                if (currentQ < total - 1) {
                    currentQ++;
                    renderQuestion();
                } else {
                    applyQuizResults();
                }
            });
        }

        function applyQuizResults() {
            // Apply scores to disorderData
            Object.entries(answers).forEach(([key, score]) => {
                if (disorderData[key]) disorderData[key].severity = score;
            });
            // Hide quiz and launch app
            quizOverlay.classList.add('hidden');
            init();
        }

        // Start with intro
        renderIntro();
        // ── End Questionnaire ───────────────────────────────────────

    </script>
