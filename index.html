<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarseyNeuroView - 3D Disorder Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@4.2.4/dist/lib.min.js" integrity="sha384-v3G5r/vlsRB0lHGwEGCtgSxdUQN8zRnTCSj638E/iin4tL3FPcW3Ruv6lV79UO6m" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --fg: #e8e8ec;
            --muted: #6b6b7b;
            --accent: #ff9f43;
            --accent-dim: #e58a3a;
            --card: rgba(20, 20, 30, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --adhd: #ff6b6b;
            --autism: #4ecdc4;
            --ocd: #ffe66d;
            --schizophrenia: #c44dff;
            --anxiety: #ff9f43;
            --depression: #5f9ea0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            min-height: 100vh;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: linear-gradient(135deg, var(--card) 0%, rgba(10, 10, 15, 0.95) 100%);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateX(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed { transform: translateX(-280px); }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(255, 159, 67, 0.2) 0%, rgba(255, 107, 107, 0.2) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255, 159, 67, 0.3);
            flex-shrink: 0;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username-section { margin-top: 16px; }

        .username-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .username-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .username-input::placeholder { color: var(--muted); }

        .menu-section {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .menu-section::-webkit-scrollbar { width: 4px; }
        .menu-section::-webkit-scrollbar-track { background: transparent; }
        .menu-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .menu-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            padding: 8px 12px;
            margin-top: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 4px 0;
        }

        .menu-item:hover { background: rgba(255, 255, 255, 0.05); }
        .menu-item.active { background: rgba(255, 159, 67, 0.15); color: var(--accent); }
        .menu-item.active .menu-icon { color: var(--accent); }

        .menu-icon { width: 20px; height: 20px; color: var(--muted); }

        /* Disorder Cards */
        .disorder-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
            transition: all 0.3s ease;
        }

        .disorder-card:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.15); }
        .disorder-card.selected { border-color: var(--accent); background: rgba(255, 159, 67, 0.08); }

        .disorder-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .disorder-info { display: flex; align-items: center; gap: 10px; }
        .disorder-dot { width: 12px; height: 12px; border-radius: 4px; }
        .disorder-name { font-weight: 600; font-size: 14px; }
        .disorder-value { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

        .disorder-sliders { display: flex; flex-direction: column; gap: 10px; }
        .slider-row { display: flex; align-items: center; gap: 10px; }
        .slider-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); width: 70px; flex-shrink: 0; }
        .slider-container { flex: 1; position: relative; }

        input[type="range"] {
            -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.1); border-radius: 3px; outline: none; cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); box-shadow: 0 0 10px rgba(255, 159, 67, 0.4); }
        input[type="range"]:focus-visible::-webkit-slider-thumb { box-shadow: 0 0 0 3px rgba(255, 159, 67, 0.4); }

        .slider-value { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--fg); width: 32px; text-align: right; }

        /* Toggle Button */
        .sidebar-toggle {
            position: absolute; right: -44px; top: 50%; transform: translateY(-50%);
            width: 36px; height: 72px; background: var(--card); border: 1px solid var(--border);
            border-left: none; border-radius: 0 8px 8px 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .sidebar-toggle:hover { background: rgba(30, 30, 45, 0.9); }
        .sidebar-toggle svg { transition: transform 0.3s ease; }
        .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }

        /* Title Overlay */
        .title-overlay {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            z-index: 50; text-align: center; pointer-events: none;
        }
        .main-title { font-size: 14px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        .sub-title { font-size: 28px; font-weight: 600; background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* Bottom Controls */
        .bottom-controls {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 12px; background: var(--card);
            backdrop-filter: blur(20px); padding: 12px 20px; border-radius: 16px; border: 1px solid var(--border);
        }

        .control-btn {
            display: flex; align-items: center; gap: 8px; padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            border-radius: 10px; color: var(--fg); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; font-family: 'Space Grotesk', sans-serif;
        }
        .control-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        .control-btn:active { transform: translateY(0); }
        .control-btn.primary { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%); border-color: var(--accent); color: var(--bg); }
        .control-btn.primary:hover { box-shadow: 0 4px 20px rgba(255, 159, 67, 0.4); }
        .control-btn.secondary { background: rgba(196, 77, 255, 0.1); border-color: rgba(196, 77, 255, 0.3); color: #c44dff; }
        .control-btn.secondary:hover { background: rgba(196, 77, 255, 0.2); }
        .control-btn svg { width: 16px; height: 16px; }

        /* Total Severity Panel */
        .total-severity-panel {
            position: fixed; right: 24px; top: 24px; min-width: 180px;
            background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; z-index: 100;
        }
        .total-severity-header { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
        .total-severity-value { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
        .total-severity-value span { font-size: 16px; color: var(--muted); font-weight: 400; }
        .severity-bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
        .severity-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ff6b6b); border-radius: 3px; transition: width 0.3s ease; }

        /* Info Panel */
        .info-panel {
            position: fixed; right: 24px; top: 130px; width: 180px;
            background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; z-index: 100; opacity: 0;
            transform: translateY(-10px); transition: all 0.3s ease; pointer-events: none;
        }
        .info-panel.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .info-color { width: 16px; height: 16px; border-radius: 4px; }
        .info-title { font-size: 18px; font-weight: 600; }
        .info-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 12px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 600; }

        /* View Indicator */
        .view-indicator {
            position: fixed; right: 24px; bottom: 100px;
            background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px; z-index: 100; display: flex; align-items: center; gap: 10px;
        }
        .view-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
        .view-text { font-size: 12px; color: var(--muted); }

        /* Tooltip */
        .tooltip {
            position: fixed; background: rgba(0, 0, 0, 0.9); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none;
            z-index: 200; opacity: 0; transition: opacity 0.2s ease;
        }
        .tooltip.visible { opacity: 1; }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            z-index: 500; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px;
            width: 90%; max-width: 600px; max-height: 80vh; overflow: hidden;
            display: flex; flex-direction: column; position: relative;
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .modal-overlay.visible .modal-content { transform: scale(1); }

        .modal-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-size: 20px; font-weight: 600; color: var(--accent); }
        .modal-close {
            background: transparent; border: none; color: var(--muted); cursor: pointer;
            padding: 4px; transition: color 0.2s;
        }
        .modal-close:hover { color: var(--fg); }

        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }

        .rec-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rec-item:last-child { border-bottom: none; margin-bottom: 0; }
        .rec-title { font-weight: 600; font-size: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .rec-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); }
        .rec-badge.low { color: #4ecdc4; background: rgba(78, 205, 196, 0.1); }
        .rec-badge.moderate { color: #ffe66d; background: rgba(255, 230, 109, 0.1); }
        .rec-badge.high { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .rec-text { font-size: 14px; color: var(--muted); line-height: 1.5; }

        /* Loading & Misc */
        .loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loading-spinner { width: 60px; height: 60px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 14px; color: var(--muted); letter-spacing: 2px; }
        .reset-all-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; margin: 16px; background: rgba(255, 107, 107, 0.1); border: 1px solid rgba(255, 107, 107, 0.3); border-radius: 10px; color: #ff6b6b; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; font-family: 'Space Grotesk', sans-serif; }
        .reset-all-btn:hover { background: rgba(255, 107, 107, 0.2); border-color: rgba(255, 107, 107, 0.5); }


        .mascot-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            pointer-events: none;
        }

        .mascot-overlay img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 12px rgba(255, 159, 67, 0.4));
        }
        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .sidebar.collapsed { transform: translateX(-240px); }
            .title-overlay { left: 180px; }
            .info-panel, .total-severity-panel { right: 12px; width: 160px; }
            .bottom-controls { flex-wrap: wrap; max-width: 90vw; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing MarseyNeuroView...</div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="recModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Personalized Recommendations</div>
                <button class="modal-close" id="closeModalBtn" aria-label="Close modal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>
    <!-- Mascot -->
    <div class="mascot-overlay">
        <img src="3dmarsey.gif" alt="Marsey">
    </div>

            <div class="info-color" id="infoColor"></div>
            <div class="info-title" id="infoTitle">Select a Disorder</div>
        </div>
        <div class="info-stats">
            <div class="stat-box"><div class="stat-label">Severity</div><div class="stat-value" id="infoSeverity">--</div></div>
            <div class="stat-box"><div class="stat-label">Prevalence</div><div class="stat-value" id="infoPrevalence">--%</div></div>
        </div>
    </div>

    <!-- View Indicator -->
    <div class="view-indicator">
        <div class="view-dot"></div>
        <span class="view-text mono">LIVE RENDER</span>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-controls">
        <button class="control-btn" id="resetView">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset View
        </button>
        <button class="control-btn" id="toggleRotation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            Auto Rotate
        </button>
        <button class="control-btn" id="toggleGrid">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
            Toggle Grid
        </button>
        <button class="control-btn secondary" id="showRecBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            Recommendations
        </button>
        <button class="control-btn primary" id="exportPDF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Export PDF
        </button>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const OrbitControls = THREE.OrbitControls;

        const { jsPDF } = window.jspdf;
        const MAX_TOTAL_SEVERITY = 600;

        // Recommendation Logic
        const recData = {
            adhd: {
                low: "Try time-blocking techniques and minimize distractions.",
                moderate: "Consider Cognitive Behavioral Therapy (CBT) and digital organization tools.",
                high: "Professional assessment for medication and structured coaching is recommended."
            },
            autism: {
                low: "Social scripts and clear communication can help navigate interactions.",
                moderate: "Occupational therapy for sensory issues and routine structuring is beneficial.",
                high: "Intensive behavioral support and specialized professional care is advised."
            },
            ocd: {
                low: "Mindfulness meditation and stress reduction exercises may help.",
                moderate: "Exposure and Response Prevention (ERP) self-help resources are recommended.",
                high: "Professional ERP therapy and psychiatric consultation is highly recommended."
            },
            schizophrenia: {
                low: "Focus on stress management and maintaining a healthy sleep schedule.",
                moderate: "Regular check-ins with a support team and supportive therapy are important.",
                high: "Antipsychotic medication management and intensive care coordination is critical."
            },
            anxiety: {
                low: "Deep breathing exercises and regular physical activity can reduce symptoms.",
                moderate: "CBT techniques and reducing caffeine intake may provide relief.",
                high: "Psychotherapy and a medication evaluation are recommended."
            },
            depression: {
                low: "Regular exercise, sunlight exposure, and socializing can boost mood.",
                moderate: "Talk therapy and establishing a strong routine is beneficial.",
                high: "Psychiatric evaluation and potential medication should be considered."
            }
        };

        function getRecommendation(key, severity) {
            const level = severity < 40 ? 'low' : severity < 70 ? 'moderate' : 'high';
            const text = recData[key] ? recData[key][level] : "No recommendation available.";
            return { level, text };
        }

        // Default disorder data structure
        const defaultDisorderData = {
            adhd: { name: 'ADHD', color: 0xff6b6b, cssColor: '#ff6b6b', severity: 10, prevalence: 5.7, position: { x: 3.5, y: 0, z: 0 } },
            autism: { name: 'Autism', color: 0x4ecdc4, cssColor: '#4ecdc4', severity: 10, prevalence: 2.3, position: { x: 1.75, y: 0, z: 3.03 } },
            ocd: { name: 'OCD', color: 0xffe66d, cssColor: '#ffe66d', severity: 10, prevalence: 1.2, position: { x: -1.75, y: 0, z: 3.03 } },
            schizophrenia: { name: 'Schizophrenia', color: 0xc44dff, cssColor: '#c44dff', severity: 10, prevalence: 0.7, position: { x: -3.5, y: 0, z: 0 } },
            anxiety: { name: 'Anxiety', color: 0xff9f43, cssColor: '#ff9f43', severity: 10, prevalence: 18.1, position: { x: -1.75, y: 0, z: -3.03 } },
            depression: { name: 'Depression', color: 0x5f9ea0, cssColor: '#5f9ea0', severity: 10, prevalence: 4.4, position: { x: 1.75, y: 0, z: -3.03 } }
        };

        // Helper to generate random int between min and max (inclusive)
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Initialize random severity for defaults on first load
        Object.keys(defaultDisorderData).forEach(key => {
            defaultDisorderData[key].severity = getRandomInt(10, 100);
        });

        let disorderData = JSON.parse(JSON.stringify(defaultDisorderData));

        let scene, camera, renderer, controls;
        let cubes = {};
        let labels = {};
        let severityLabels = {};
        let gridHelper;
        let autoRotate = false;
        let showGrid = true;
        let hoveredCube = null;
        let selectedDisorder = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // DOM Elements
        const container = document.getElementById('canvas-container');
        const loadingScreen = document.getElementById('loading');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const infoPanel = document.getElementById('infoPanel');
        const tooltip = document.getElementById('tooltip');
        const disorderCardsContainer = document.getElementById('disorder-cards');
        const usernameInput = document.getElementById('usernameInput');
        const totalSeverityValueEl = document.getElementById('totalSeverityValue');
        const severityBarFillEl = document.getElementById('severityBarFill');
        const recModal = document.getElementById('recModal');
        const modalBody = document.getElementById('modalBody');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const showRecBtn = document.getElementById('showRecBtn');

        function updateTotalSeverity() {
            let total = 0;
            Object.values(disorderData).forEach(d => {
                total += d.severity;
            });
            
            if (totalSeverityValueEl) {
                totalSeverityValueEl.textContent = total;
            }
            if (severityBarFillEl) {
                severityBarFillEl.style.width = `${(total / MAX_TOTAL_SEVERITY) * 100}%`;
            }
        }

        function createDisorderCards() {
            disorderCardsContainer.innerHTML = '';
            Object.entries(disorderData).forEach(([key, data]) => {
                const card = document.createElement('div');
                card.className = 'disorder-card';
                card.id = `card-${key}`;
                card.innerHTML = `
                    <div class="disorder-header">
                        <div class="disorder-info">
                            <div class="disorder-dot" style="background: ${data.cssColor};"></div>
                            <span class="disorder-name">${data.name}</span>
                        </div>
                        <span class="disorder-value" id="severity-value-${key}">${data.severity}</span>
                    </div>
                    <div class="disorder-sliders">
                        <div class="slider-row">
                            <span class="slider-label">Severity</span>
                            <div class="slider-container">
                                <input type="range" min="10" max="100" value="${data.severity}" data-disorder="${key}" aria-label="${data.name} severity">
                            </div>
                            <span class="slider-value" id="severity-display-${key}">${data.severity}</span>
                        </div>
                    </div>`;
                disorderCardsContainer.appendChild(card);
            });
            
            document.querySelectorAll('input[type="range"]').forEach(slider => {
                slider.addEventListener('input', handleSliderChange);
            });
        }

        function handleSliderChange(e) {
            const disorderKey = e.target.dataset.disorder;
            const value = parseInt(e.target.value);

            disorderData[disorderKey].severity = value;

            document.getElementById(`severity-display-${disorderKey}`).textContent = value;
            document.getElementById(`severity-value-${disorderKey}`).textContent = value;
            
            updateTotalSeverity();
            updateCubeHeight(disorderKey);
            
            if (selectedDisorder === disorderKey) {
                updateInfoPanel(disorderKey);
            }
        }

        function updateCubeHeight(disorderKey) {
            const data = disorderData[disorderKey];
            const cube = cubes[disorderKey];
            if (!cube) return;
            
            const targetHeight = data.severity / 20;
            
            const animateHeight = () => {
                const diff = targetHeight - cube.scale.y;
                if (Math.abs(diff) > 0.01) {
                    cube.scale.y += diff * 0.15;
                    cube.position.y = cube.scale.y / 2;
                    requestAnimationFrame(animateHeight);
                } else {
                    cube.scale.y = targetHeight;
                    cube.position.y = targetHeight / 2;
                }
            };
            animateHeight();
            
            if (labels[disorderKey]) labels[disorderKey].position.y = 5.8;

            // Update severity label value and track cube mid-height for position
            const sevLabel = severityLabels[disorderKey];
            if (sevLabel) {
                const canvas = sevLabel.userData.canvas;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 40px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(data.severity.toString(), canvas.width / 2, canvas.height / 2);
                sevLabel.material.map.needsUpdate = true;

                // Animate position alongside cube height
                const animateLabel = () => {
                    sevLabel.position.y = cubes[disorderKey].position.y;
                    if (Math.abs(cubes[disorderKey].scale.y - targetHeight) > 0.01) {
                        requestAnimationFrame(animateLabel);
                    }
                };
                animateLabel();
            }
        }


        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 8);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 20;
            controls.maxPolarAngle = Math.PI / 2.1;

            setupLights();
            createGrid();
            createDisorderCards();
            createDisorderCubes();
            createParticles();
            createGroundPlane();
            setupEventListeners();
            
            updateTotalSeverity();

            setTimeout(() => loadingScreen.classList.add('hidden'), 1500);
            animate();
        }

        function setupLights() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(10, 15, 10);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 50;
            mainLight.shadow.camera.left = -15;
            mainLight.shadow.camera.right = 15;
            mainLight.shadow.camera.top = 15;
            mainLight.shadow.camera.bottom = -15;
            scene.add(mainLight);

            const accentLight1 = new THREE.PointLight(0xff9f43, 0.5, 20);
            accentLight1.position.set(-8, 5, -8);
            scene.add(accentLight1);

            const accentLight2 = new THREE.PointLight(0xc44dff, 0.5, 20);
            accentLight2.position.set(8, 5, 8);
            scene.add(accentLight2);
        }

        function createGrid() {
            gridHelper = new THREE.GridHelper(20, 20, 0xff9f43, 0x1a1a2e);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);
        }

        function createDisorderCubes() {
            const geometry = new THREE.BoxGeometry(1.2, 1, 1.2);
            Object.entries(disorderData).forEach(([key, data]) => {
                const height = data.severity / 20;
                const material = new THREE.MeshStandardMaterial({ color: data.color, metalness: 0.3, roughness: 0.4, emissive: data.color, emissiveIntensity: 0.1 });
                const cube = new THREE.Mesh(geometry, material);
                cube.scale.y = height;
                cube.position.set(data.position.x, height / 2, data.position.z);
                cube.castShadow = true;
                cube.receiveShadow = true;
                cube.userData = { key, ...data };

                scene.add(cube);
                cubes[key] = cube;

                const label = createLabel(data.name, data.position.x, 5.8, data.position.z, data.color);
                labels[key] = label;

                const sevLabel = createSeverityLabel(data.severity, data.position.x + 0.95, cube.scale.y / 2, data.position.z);
                severityLabels[key] = sevLabel;
            });
        }


        function createLabel(text, x, y, z, color) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            context.fillStyle = 'transparent';
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.font = 'bold 32px Space Grotesk, sans-serif';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.shadowColor = 'rgba(0, 0, 0, 0.5)';
            context.shadowBlur = 8;
            context.shadowOffsetX = 2;
            context.shadowOffsetY = 2;
            context.fillStyle = '#' + color.toString(16).padStart(6, '0');
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.set(x, y, z);
            sprite.scale.set(2, 0.5, 1);
            scene.add(sprite);
            return sprite;
        }

        function createSeverityLabel(value, x, y, z) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            context.font = 'bold 40px Arial, sans-serif';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillStyle = '#ffffff';
            context.fillText(value.toString(), canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.set(x, y, z);
            sprite.scale.set(0.9, 0.45, 1);
            sprite.userData.canvas = canvas;
            scene.add(sprite);
            return sprite;
        }

        function createParticles() {
            const particleCount = 500;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const colorPalette = [new THREE.Color(0xff9f43), new THREE.Color(0xc44dff), new THREE.Color(0xff6b6b), new THREE.Color(0x4ecdc4), new THREE.Color(0xffe66d)];
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 40;
                positions[i3 + 1] = Math.random() * 15;
                positions[i3 + 2] = (Math.random() - 0.5) * 40;
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;
                sizes[i] = Math.random() * 3 + 1;
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            const material = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, sizeAttenuation: true });
            const particles = new THREE.Points(geometry, material);
            particles.userData.isParticle = true;
            scene.add(particles);
        }

        function createGroundPlane() {
            const geometry = new THREE.PlaneGeometry(30, 30);
            const material = new THREE.MeshStandardMaterial({ color: 0x0a0a12, metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.5 });
            const ground = new THREE.Mesh(geometry, material);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.02;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function updateInfoPanel(disorderKey) {
            const data = disorderData[disorderKey];
            if (!data) return;
            document.getElementById('infoColor').style.background = data.cssColor;
            document.getElementById('infoTitle').textContent = data.name;
            document.getElementById('infoSeverity').textContent = data.severity;
            document.getElementById('infoPrevalence').textContent = data.prevalence + '%';
            infoPanel.classList.add('visible');
        }

        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onCanvasClick);
            sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    handleViewChange(item.dataset.view);
                });
            });

            document.getElementById('resetView').addEventListener('click', resetView);
            document.getElementById('toggleRotation').addEventListener('click', toggleAutoRotate);
            document.getElementById('toggleGrid').addEventListener('click', toggleGridVisibility);
            document.getElementById('exportPDF').addEventListener('click', exportToPDF);
            document.getElementById('resetAllBtn').addEventListener('click', resetAllDisorders);
            
            showRecBtn.addEventListener('click', openRecModal);
            closeModalBtn.addEventListener('click', closeRecModal);
            recModal.addEventListener('click', (e) => {
                if (e.target === recModal) closeRecModal();
            });
        }

        function openRecModal() {
            let html = '';
            Object.entries(disorderData).forEach(([key, data]) => {
                const rec = getRecommendation(key, data.severity);
                html += `
                    <div class="rec-item">
                        <div class="rec-title">
                            <span style="color:${data.cssColor}">${data.name}</span>
                            <span class="rec-badge ${rec.level}">${rec.level.toUpperCase()}</span>
                        </div>
                        <div class="rec-text">${rec.text}</div>
                    </div>
                `;
            });
            modalBody.innerHTML = html;
            recModal.classList.add('visible');
        }

        function closeRecModal() {
            recModal.classList.remove('visible');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const cubeArray = Object.values(cubes);
            const intersects = raycaster.intersectObjects(cubeArray);
            if (intersects.length > 0) {
                const cube = intersects[0].object;
                if (hoveredCube !== cube) {
                    if (hoveredCube) hoveredCube.material.emissiveIntensity = 0.1;
                    hoveredCube = cube;
                    cube.material.emissiveIntensity = 0.4;
                    tooltip.textContent = cube.userData.name;
                    tooltip.classList.add('visible');
                }
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
                document.body.style.cursor = 'pointer';
            } else {
                if (hoveredCube) { hoveredCube.material.emissiveIntensity = 0.1; hoveredCube = null; }
                tooltip.classList.remove('visible');
                document.body.style.cursor = 'default';
            }
        }

        function onCanvasClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Object.values(cubes));
            if (intersects.length > 0) selectDisorder(intersects[0].object.userData.key);
        }

        function selectDisorder(disorderKey) {
            document.querySelectorAll('.disorder-card').forEach(card => card.classList.remove('selected'));
            const card = document.getElementById(`card-${disorderKey}`);
            if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
            selectedDisorder = disorderKey;
            updateInfoPanel(disorderKey);
            const cube = cubes[disorderKey];
            if (cube) {
                animateCamera({ x: cube.position.x + 5, y: cube.scale.y + 4, z: cube.position.z + 5 });
                cube.material.emissiveIntensity = 0.5;
                setTimeout(() => cube.material.emissiveIntensity = 0.2, 500);
            }
        }

        function handleViewChange(view) {
            let targetPosition;
            switch(view) {
                case 'top': targetPosition = { x: 0, y: 12, z: 0.1 }; break;
                case 'side': targetPosition = { x: 12, y: 4, z: 0 }; break;
                default: targetPosition = { x: 8, y: 6, z: 8 };
            }
            animateCamera(targetPosition);
        }

        function animateCamera(target) {
            const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
            const duration = 1000;
            const startTime = Date.now();
            function updateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                camera.position.set(startPos.x + (target.x - startPos.x) * eased, startPos.y + (target.y - startPos.y) * eased, startPos.z + (target.z - startPos.z) * eased);
                if (progress < 1) requestAnimationFrame(updateCamera);
            }
            updateCamera();
        }

        function resetView() {
            animateCamera({ x: 8, y: 6, z: 8 });
            infoPanel.classList.remove('visible');
            selectedDisorder = null;
            document.querySelectorAll('.disorder-card').forEach(card => card.classList.remove('selected'));
        }

        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 1;
            document.getElementById('toggleRotation').style.background = autoRotate ? 'rgba(255, 159, 67, 0.2)' : 'rgba(255, 255, 255, 0.05)';
        }

        function toggleGridVisibility() {
            showGrid = !showGrid;
            gridHelper.visible = showGrid;
            document.getElementById('toggleGrid').style.background = showGrid ? 'rgba(255, 159, 67, 0.2)' : 'rgba(255, 255, 255, 0.05)';
        }

        function getCompressedDataURL(sourceCanvas, maxWidth, quality) {
            const aspect = sourceCanvas.height / sourceCanvas.width;
            const width = Math.min(sourceCanvas.width, maxWidth);
            const height = width * aspect;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(sourceCanvas, 0, 0, width, height);
            return tempCanvas.toDataURL('image/jpeg', quality);
        }

        function exportToPDF() {
            renderer.render(scene, camera);
            const imgData = getCompressedDataURL(renderer.domElement, 1920, 0.70);
            const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: 'a4', compress: true });

            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            
            const username = usernameInput.value.trim() || 'Anonymous User';
            const totalSeverity = totalSeverityValueEl.textContent;
            
            doc.setFontSize(24);
            doc.setTextColor(255, 159, 67);
            doc.text('MarseyNeuroView Report', 14, 20);
            
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text(`User: ${username}`, 14, 30);
            
            doc.setFontSize(14);
            doc.setTextColor(255, 159, 67);
            doc.text(`Total Severity Score: ${totalSeverity} / 600`, 14, 38);

            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            const now = new Date();
            doc.text(`Generated: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`, 150, 30);
            
            const imgWidth = pageWidth - 28;
            const imgHeight = (imgWidth * 9) / 16;
            doc.addImage(imgData, 'JPEG', 14, 45, imgWidth, imgHeight);
            
            doc.addPage();
            
            doc.setFontSize(20);
            doc.setTextColor(255, 159, 67);
            doc.text('Recommendations', 14, 20);

            let y = 35;

            Object.entries(disorderData).forEach(([key, data]) => {
                if (y > pageHeight - 40) { 
                    doc.addPage(); 
                    y = 20; 
                }

                const rec = getRecommendation(key, data.severity);
                
                doc.setFontSize(14);
                doc.setTextColor(data.cssColor);
                doc.text(data.name, 14, y);
                
                doc.setFontSize(10);
                doc.setTextColor(80, 80, 80);
                doc.text(`Level: ${rec.level.charAt(0).toUpperCase() + rec.level.slice(1)}`, 60, y);

                y += 6;
                
                const splitText = doc.splitTextToSize(rec.text, pageWidth - 30);
                doc.setTextColor(0, 0, 0);
                doc.text(splitText, 14, y);
                
                y += (splitText.length * 5) + 8;
            });

            doc.setFontSize(8);
            doc.setTextColor(80, 80, 80);
            doc.text(`Report for ${username} - MarseyNeuroView`, pageWidth / 2, pageHeight - 10, { align: 'center' });
            
            doc.save(`MarseyNeuroView-${username.replace(/\s+/g, '_')}-Report.pdf`);
        }

        function resetAllDisorders() {
            disorderData = JSON.parse(JSON.stringify(defaultDisorderData));
            createDisorderCards();
            Object.keys(disorderData).forEach(key => updateCubeHeight(key));
            updateTotalSeverity();
            selectedDisorder = null;
            infoPanel.classList.remove('visible');
            document.querySelectorAll('.disorder-card').forEach(card => card.classList.remove('selected'));
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = Date.now() * 0.001;
            Object.entries(cubes).forEach(([key, cube], i) => {
                const baseHeight = cube.scale.y;
                cube.position.y = baseHeight / 2 + Math.sin(time + i) * 0.03;
                const pulse = 1 + Math.sin(time * 2 + i * 0.5) * 0.01;
                cube.scale.x = pulse;
                cube.scale.z = pulse;
            });
            scene.children.forEach(child => {
                if (child.userData && child.userData.isParticle) child.rotation.y += 0.0003;
            });
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
